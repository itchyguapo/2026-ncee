<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <style>
        .border-primary { border-color: #FF2E2E; }
        .text-primary { color: #FF2E2E; }
        .bg-primary { background-color: #FF2E2E; }
        .focus\:ring-primary:focus { ring-color: #FF2E2E; }
        .focus\:border-primary:focus { border-color: #FF2E2E; }
        .hover\:bg-dark:hover { background-color: #cc2424; }
        .text-dark { color: #1f2937; }
    </style>
</head>
<body class="bg-gray-50">
    {{ content }}
    <script src="{{ '/assets/js/schools.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
