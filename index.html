<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCEE Registration 2023</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="py-8 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
                <div class="text-center mb-6">
                    <h1 class="text-4xl font-bold text-blue-600 mb-2">NCEE REGISTRATION 2023</h1>
                    <p class="text-gray-700 text-sm leading-relaxed">Fill out the form in <strong>BLOCK letters</strong>. All entries are <strong>FINAL</strong>.</p>
                </div>
            </div>

            <form action="https://formspree.io/f/xwvzpqab" method="POST" class="bg-white rounded-lg shadow-lg p-8 space-y-6" id="registrationForm">
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-3">Personal Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><input type="text" name="surname" class="w-full px-4 py-2 border rounded" placeholder="Surname *" required></div>
                        <div><input type="text" name="firstName" class="w-full px-4 py-2 border rounded" placeholder="First Name *" required></div>
                        <div><input type="text" name="middleName" class="w-full px-4 py-2 border rounded" placeholder="Middle Name"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><input type="date" name="dateOfBirth" class="w-full px-4 py-2 border rounded" required></div>
                        <div class="flex gap-4">
                            <label><input type="radio" name="gender" value="MALE" required> MALE</label>
                            <label><input type="radio" name="gender" value="FEMALE" required> FEMALE</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><input type="text" name="disability" class="w-full px-4 py-2 border rounded" placeholder="Disability"></div>
                        <div><input type="text" name="nin" class="w-full px-4 py-2 border rounded" placeholder="NIN *" required></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-3">Origin Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><input type="text" name="stateOfOrigin" class="w-full px-4 py-2 border rounded" placeholder="State of Origin *" required></div>
                        <div><input type="text" name="lgaOfOrigin" class="w-full px-4 py-2 border rounded" placeholder="LGA of Origin *" required></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-3">Residence Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><input type="text" name="stateOfResidence" class="w-full px-4 py-2 border rounded" placeholder="State of Residence *" required></div>
                        <div><input type="text" name="lgaOfResidence" class="w-full px-4 py-2 border rounded" placeholder="LGA of Residence *" required></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-3">Contact Information</h2>
                    <div><input type="text" name="parentsName" class="w-full px-4 py-2 border rounded" placeholder="Parent's Name *" required></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><input type="tel" name="phoneNumber" class="w-full px-4 py-2 border rounded" placeholder="Phone Number *" required></div>
                        <div><input type="email" name="email" class="w-full px-4 py-2 border rounded" placeholder="Email *" required></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-3">School Selections</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><select name="northEast" class="w-full px-4 py-2 border rounded" required id="northEast"><option value="">North East *</option></select></div>
                        <div><select name="northCentral" class="w-full px-4 py-2 border rounded" required id="northCentral"><option value="">North Central *</option></select></div>
                        <div><select name="northWest" class="w-full px-4 py-2 border rounded" required id="northWest"><option value="">North West *</option></select></div>
                        <div><select name="southEast" class="w-full px-4 py-2 border rounded" required id="southEast"><option value="">South East *</option></select></div>
                        <div><select name="southWest" class="w-full px-4 py-2 border rounded" required id="southWest"><option value="">South West *</option></select></div>
                        <div><select name="southSouth" class="w-full px-4 py-2 border rounded" required id="southSouth"><option value="">South South *</option></select></div>
                    </div>
                </div>

                <button type="submit" class="w-full px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">Submit Registration</button>
            </form>
        </div>
    </div>
    <script src="schools.js"></script>
    <script src="app.js"></script>
</body>
</html>
